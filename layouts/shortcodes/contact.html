<div class="form-group row">
    <label for="name">Name</label>
    <div class="input-group">
        <input id="name" name="name" placeholder="Please enter your name" type="text" autocomplete="off"
            required="required" class="form-control">
    </div>
</div>
<div class="form-group row">
    <label for="email" class="col-4 col-form-label">E-mail address</label>
    <div class="input-group">
        <input id="email" name="email" placeholder="Your e-mail address" type="text" autocomplete="off"
            required="required" class="form-control">
    </div>
</div>
<div class="form-group row">
    <label for="message" class="col-4 col-form-label">Message</label>
    <div class="input-group">
        <textarea id="message" name="message" placeholder="Your message" required="required"
            class="form-control"></textarea>
    </div>
</div>
<div class="button-layer form-group row">
    <div class="offset-4 col-8">
        <button name="submit" type="submit" class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>

<style>
    .input-group {
        background: var(--secondary);
        padding: 10px;
        border-radius: 5px;
    }

    #name {
        background: var(--secondary);
        padding: 6px;
        width: 100%;
    }

    ::placeholder {
        color: var(--tertiary);
    }

    #email {
        background: var(--secondary);
        padding: 6px;
        width: 100%;
    }

    #message {
        background: var(--secondary);
        padding: 10px;
        width: 100%;
    }

    .button-layer {
        width: 100%;
        display: flex;
        padding: 12px 16px 12px 16px;
        justify-content: center;
    }

    .btn {
        padding: 10px 20px;
        background: var(--tertiary);
        border-radius: 5px;
    }
</style>

<script>
    function sendMessage() {
        var name = document.getElementById("name");
        var email = document.getElementById("email");
        var message = document.getElementById("message");

        const request = new XMLHttpRequest();
        request.open("POST", "https://discord.com/api/webhooks/1042856908798820473/4Bbd9KHjsezmlSTEBqEUcMfV9OSkFqrcXBrwbR96tAlO1DFiiTudVNgOJmXq4ppBhxhM");

        request.setRequestHeader('Content-type', 'application/json');

        const params = {
            username: "Blog - Contact Me",
            avatar_url: "",
            content: `**Name**: ${name.value}\n**Email**: ${email.value}\n**Message**: ${message.value}`
        }

        request.send(JSON.stringify(params));
        request.onload = () => {
            if (request.status == 204)
                window.open("https://serenevoid.github.io/", "_parent");
            else
                alert("Cannot send message to the Author")
        };
    }
</script>
